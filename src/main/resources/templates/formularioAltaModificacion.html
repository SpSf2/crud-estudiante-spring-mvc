<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Alta/Modificacion</title>
</head>
    <style>
.error {
color: red;
font-weight: bold;
}
</style>
<body>
    <h1>Formulario Alta/Modificacion</h1>
    
    <fieldset>
        <legend>Formulario de Alta o Modificacion</legend>
        <form th:action="@{/estudiantes/persistir}" method="post" th:object="${estudiante}" enctype="multipart/form-data"> 
          <input type="hidden" th:field="*{id}">
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" required th:field="*{nombre}">
            <p th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}" class="error"></p>
        </div>
        <div>
            <label for="primerApellido">Primer Apellido:</label>
            <input type="text" id="primerApellido" name="primerApellido" required="required" th:field="*{primerApellido}">
            <p th:if="${#fields.hasErrors('primerApellido')}" th:errors="*{primerApellido}" class="error"></p>
        </div>
        <div>
            <label for="segundoApellido">Segundo Apellido:</label>
            <input type="text" id="segundoApellido" name="segundoApellido" th:field="*{segundoApellido}">
        </div>
        <div>
            <fieldset>
                <legend>Genero</legend>
                <label for="hombre">Hombre</label>
                <input type="radio" id="hombre" name="genero" value="HOMBRE" th:field="*{genero}">
                <label for="mujer">Mujer</label>
                <input type="radio" id="mujer" name="genero" value="MUJER" th:field="*{genero}">
                <label for="otro">Otro</label>
                <input type="radio" id="otro" name="genero" value="OTRO" th:field="*{genero}">
            </fieldset>
        </div>
          <div> 
            <label for="fechaMatriculacion">Fecha de Matriculacion:</label>
            <input type="date" id="fechaMatriculacion" th:field="*{fechaMatriculacion}">
           <p th:if="${#fields.hasErrors('fechaMatriculacion')}" th:errors="*{fechaMatriculacion}" class="error"><Fecha Incorrecta></p>
          </div>
          
          <div>
            <label for="direccion">Direccion:</label>
            <input type="text" id="direccion" name="direccion" th:field="*{direccion}">
            <p th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}" class="error"></p>
          </div>
          <div>
            <label for="numerosTelefono">Numeros de Telefono:</label>
            <input type="text" id="numerosTelefono" name="numerosTelefono" 
                               placeholder="Uno o varios separados por ;"
                               th:value="${numerosTelefono}">
            <p th:if="${errorTelefono}" th:text="${errorTelefono}" class="error"></p>         
          </div>
          <div>
            <label for="dircorreos">Correos:</label>
            <input type="text" id="dircorreos" name="dircorreos" 
                               placeholder="Uno o varios separados por ;"
                               th:value="${dircorreos}">   
            <p th:if="${errorCorreo}" th:text="${errorCorreo}" class="error"></p>
          </div>
          <p th:if="${errorGeneral}" th:text="${errorGeneral}" class="error"></p>
          
          <div>
            <label for="facultades">Facultad:</label>
            <select id="facultades" th:field="*{facultad}">
              <option value=""></option>
              <option th:each="facultad : ${facultades}"
                      th:value="${facultad.id}"
                      th:text="${facultad.nombre}">
              </option>
            </select>
          </div> 

          <div>
            <label for="file">Foto del Estudiante</label>
            <input type="file" id="file" name="file" title="Selecciona un archivo">
              <div th:if="${estudiante.id != 0 and estudiante.foto != null}">
                  <h4>Foto actual del Estudiante:</h4>
                  <img th:src="@{'/imagenes/' + ${estudiante.foto}}" alt="Foto del Estudiante">
              </div>
          </div>

          <div>
              <label for="beca">Beca</label>
              <input type="number" id="beca" step="any" th:field="*{beca}">
              <p th:if="${#fields.hasErrors('beca')}" th:errors="*{beca}" class="error"></p>
          </div>

          <div>
            <button type="submit">Enviar</button>
          </div>
      </form>
    </fieldset>
    
</body>
</html>
